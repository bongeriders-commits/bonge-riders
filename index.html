<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Bonge Riders — Bogonko-Ngelani Stage Welfare Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0E1013">
<meta name="description" content="Bonge Riders — official welfare tracker for Bogonko Bodaboda &amp; Matatu Stage, Katani, Pridelands. Located at Kwa Bogonko Stage, Katani. Contact: 0725672771. M-Pesa Paybill 544600, Account 942540.">
<meta property="og:title" content="Bonge Riders — Bogonko-Ngelani Stage Welfare Tracker">
<meta property="og:description" content="Official welfare and contributions tracker for Bogonko-Ngelani Matatu Stage. M-Pesa Paybill 544600, Account 942540.">
<meta property="og:type" content="website">
<meta property="og:image" content="/icon-512.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BONGE RIDERS">
<link rel="apple-touch-icon" href="/icon-180.png">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; overflow:hidden; background:#0E1013; font-family:'Inter',sans-serif; }

  #contentFrame{
    position:fixed; left:0; right:0; top:0; bottom:0;
    width:100%; border:none; background:#0E1013;
  }

  /* ---------- Floating rotating CD icon ---------- */
  #cdIcon{
    position:fixed; right:16px; bottom:calc(16px + env(safe-area-inset-bottom));
    z-index:9998; width:52px; height:52px; border-radius:50%;
    background:#171A20 center/cover no-repeat;
    border:2px solid #333844; box-shadow:0 4px 14px rgba(0,0,0,.4);
    display:none; align-items:center; justify-content:center;
    font-size:18px; color:#9CA3AF; cursor:pointer;
    animation:spin 3.2s linear infinite; animation-play-state:paused;
  }
  #cdIcon.visible{ display:flex; }
  #cdIcon.playing{ animation-play-state:running; }
  #cdIcon::after{
    content:""; position:absolute; width:8px; height:8px; border-radius:50%;
    background:#0E1013; border:1px solid #333844;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* ---------- Expandable mini player panel ---------- */
  #miniPanel{
    position:fixed; right:16px; bottom:calc(76px + env(safe-area-inset-bottom));
    z-index:9999; width:240px; border-radius:14px;
    background:#171A20; border:1px solid #333844; box-shadow:0 8px 24px rgba(0,0,0,.45);
    padding:10px 12px 12px; overflow:hidden;
    opacity:0; transform:translateY(8px) scale(.96); pointer-events:none;
    transition:opacity .15s ease, transform .15s ease;
  }
  #miniPanel.show{ opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }

  #spProgress{
    position:relative; height:3px; border-radius:2px; margin-bottom:10px;
    background:#333844; cursor:pointer;
  }
  #spProgressFill{ position:absolute; left:0; top:0; height:100%; width:0%; background:#E02020; border-radius:2px; }

  #spRow{ display:flex; align-items:center; gap:10px; }
  #spCover{
    width:38px; height:38px; border-radius:8px; flex:none;
    background:#242832 center/cover no-repeat;
    display:flex; align-items:center; justify-content:center;
    font-size:16px; color:#9CA3AF;
  }
  #spInfo{ flex:1; min-width:0; }
  #spTitle{
    font-size:12.5px; font-weight:600; color:#F3F4F6;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  #spSub{
    font-size:10.5px; color:#9CA3AF; font-weight:500;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  #spClose{ color:#6B7280; font-size:16px; flex:none; }
  #spControls{ display:flex; align-items:center; justify-content:center; gap:18px; margin-top:8px; }
  .sp-btn{
    background:none; border:none; color:#F3F4F6; font-size:15px;
    width:30px; height:30px; flex:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .sp-btn.main{
    width:36px; height:36px; border-radius:50%; background:#E02020; font-size:14px;
  }

  #ytPortal{
    position:fixed; width:2px; height:2px; opacity:0.01;
    left:-9999px; top:-9999px; pointer-events:none;
  }
</style>
</head>
<body>

<iframe id="contentFrame" title="Bonge Riders"></iframe>

<div id="cdIcon"><span id="cdIconGlyph">&#9834;</span></div>

<div id="miniPanel">
  <div id="spProgress"><div id="spProgressFill"></div></div>
  <div id="spRow">
    <div id="spCover">&#9834;</div>
    <div id="spInfo">
      <div id="spTitle">&mdash;</div>
      <div id="spSub">&mdash;</div>
    </div>
    <button class="sp-btn" id="spClose">&times;</button>
  </div>
  <div id="spControls">
    <button class="sp-btn" id="spPrev">&#9664;&#9664;</button>
    <button class="sp-btn main" id="spPlay">&#9654;</button>
    <button class="sp-btn" id="spNext">&#9654;&#9654;</button>
  </div>
</div>

<div id="ytPortal"></div>
<script src="https://www.youtube.com/iframe_api"></script>

<script>
(function(){
  "use strict";

  // ---------------- Iframe content navigation ----------------
  var frame = document.getElementById("contentFrame");
  var params = new URLSearchParams(window.location.search);
  var startPage = params.get("page") || "home.html";
  frame.src = startPage;

  // ---------------- Shared state ----------------
  var mode = null;          // 'track' | 'yt' | null
  var queue = [];
  var queueIndex = -1;

  var audio = new Audio();
  audio.preload = "metadata";

  var ytPlayer = null, ytReady = false, ytPending = null;
  var ytMeta = { title: "", thumbUrl: "" };

  var cdIcon = document.getElementById("cdIcon");
  var miniPanel = document.getElementById("miniPanel");
  var spCover = document.getElementById("spCover");
  var spTitle = document.getElementById("spTitle");
  var spSub = document.getElementById("spSub");
  var spPlay = document.getElementById("spPlay");
  var spFill = document.getElementById("spProgressFill");
  var spProgress = document.getElementById("spProgress");

  // ---------------- Floating icon + expandable panel ----------------
  var collapseTimer = null;

  function showPlayer(){
    cdIcon.classList.add("visible");
  }
  function hidePlayer(){
    cdIcon.classList.remove("visible", "playing");
    collapsePanel();
  }
  function expandPanel(){
    miniPanel.classList.add("show");
    resetCollapseTimer();
  }
  function collapsePanel(){
    miniPanel.classList.remove("show");
    clearTimeout(collapseTimer);
  }
  function resetCollapseTimer(){
    clearTimeout(collapseTimer);
    collapseTimer = setTimeout(collapsePanel, 3000);
  }

  cdIcon.addEventListener("click", function(){
    expandPanel();
  });
  miniPanel.addEventListener("click", function(){
    resetCollapseTimer();
  });
  miniPanel.addEventListener("touchstart", function(){
    resetCollapseTimer();
  }, { passive: true });
  document.addEventListener("click", function(e){
    if (miniPanel.classList.contains("show") &&
        !miniPanel.contains(e.target) && !cdIcon.contains(e.target)) {
      collapsePanel();
    }
  });

  function setPlayIcon(isPlaying){
    spPlay.innerHTML = isPlaying ? "&#10073;&#10073;" : "&#9654;";
    cdIcon.classList.toggle("playing", !!isPlaying);
  }
  function setCoverArt(url, glyph){
    var cdGlyph = document.getElementById("cdIconGlyph");
    if (url) {
      cdIcon.style.backgroundImage = "url('" + url + "')";
      cdGlyph.style.display = "none";
    } else {
      cdIcon.style.backgroundImage = "none";
      cdGlyph.style.display = "block";
      cdGlyph.textContent = glyph || "\u266A";
    }
  }

  // ---------------- Track (podcast/music) playback ----------------
  function playTrackAt(index){
    var t = queue[index];
    if (!t) return;
    queueIndex = index;
    mode = "track";
    stopYt();
    audio.src = t.storageUrl;
    audio.play().catch(function(){});
    spTitle.textContent = t.title || "Untitled";
    spSub.textContent = ((t.type || "music").toUpperCase()) + (t.category ? " · " + t.category : "");
    spCover.style.backgroundImage = t.coverUrl ? "url('" + t.coverUrl + "')" : "none";
    spCover.textContent = t.coverUrl ? "" : (t.type === "podcast" ? "\u{1F399}" : "\u266A");
    setCoverArt(t.coverUrl, t.type === "podcast" ? "\u{1F399}" : "\u266A");
    showPlayer();
    setMediaSession(t);
    broadcastAudioStatus();
  }
  function trackNext(){
    if (!queue.length) return;
    playTrackAt((queueIndex + 1) % queue.length);
  }
  function trackPrev(){
    if (!queue.length) return;
    playTrackAt((queueIndex - 1 + queue.length) % queue.length);
  }
  function setMediaSession(t){
    if (!("mediaSession" in navigator)) return;
    navigator.mediaSession.metadata = new MediaMetadata({
      title: t.title || "Untitled",
      artist: "Bonge Radio",
      album: t.category || "",
      artwork: t.coverUrl ? [{ src: t.coverUrl, sizes: "512x512", type: "image/png" }] : []
    });
    navigator.mediaSession.setActionHandler("play", function(){ audio.play(); });
    navigator.mediaSession.setActionHandler("pause", function(){ audio.pause(); });
    navigator.mediaSession.setActionHandler("previoustrack", trackPrev);
    navigator.mediaSession.setActionHandler("nexttrack", trackNext);
  }

  audio.addEventListener("play", function(){ setPlayIcon(true); broadcastAudioStatus(); });
  audio.addEventListener("pause", function(){ setPlayIcon(false); broadcastAudioStatus(); });
  audio.addEventListener("ended", function(){ trackNext(); });
  audio.addEventListener("timeupdate", function(){
    if (mode !== "track" || !audio.duration) return;
    spFill.style.width = ((audio.currentTime / audio.duration) * 100) + "%";
    broadcastAudioStatus();
  });

  spProgress.addEventListener("click", function(e){
    var rect = spProgress.getBoundingClientRect();
    var pct = (e.clientX - rect.left) / rect.width;
    if (mode === "track" && audio.duration) audio.currentTime = pct * audio.duration;
    if (mode === "yt" && ytReady && ytPlayer.getDuration) ytPlayer.seekTo(pct * ytPlayer.getDuration(), true);
  });

  spPrev.onclick = function(){ if (mode === "track") trackPrev(); };
  spNext.onclick = function(){ if (mode === "track") trackNext(); };
  spPlay.onclick = function(){
    if (mode === "track") { if (audio.paused) audio.play(); else audio.pause(); }
    else if (mode === "yt" && ytReady) {
      var st = ytPlayer.getPlayerState();
      if (st === YT.PlayerState.PLAYING) ytPlayer.pauseVideo(); else ytPlayer.playVideo();
    }
  };
  document.getElementById("spClose").onclick = function(){
    if (mode === "track") { audio.pause(); audio.removeAttribute("src"); }
    if (mode === "yt") stopYt();
    mode = null;
    hidePlayer();
  };

  // ---------------- YouTube (audio-mode) background playback ----------------
  function initYt(){
    ytPlayer = new YT.Player("ytPortal", {
      height: "2", width: "2",
      playerVars: { playsinline: 1 },
      events: {
        onReady: function(){
          ytReady = true;
          if (ytPending) { ytPlayer.loadVideoById(ytPending); ytPending = null; }
        },
        onStateChange: onYtState
      }
    });
  }
  if (window.YT && window.YT.Player) initYt();
  else window.onYouTubeIframeAPIReady = initYt;

  function onYtState(e){
    if (mode !== "yt") return;
    if (e.data === YT.PlayerState.PLAYING) setPlayIcon(true);
    else setPlayIcon(false);
    broadcastYtStatus();
  }

  function playYtAudio(videoId, title, thumbUrl, startSeconds){
    mode = "yt";
    audio.pause();
    ytMeta = { title: title || "Untitled", thumbUrl: thumbUrl || "" };
    if (ytReady) {
      ytPlayer.loadVideoById(videoId, startSeconds || 0);
    } else {
      ytPending = videoId;
    }
    spTitle.textContent = ytMeta.title;
    spSub.textContent = "YOUTUBE · AUDIO";
    spCover.style.backgroundImage = thumbUrl ? "url('" + thumbUrl + "')" : "none";
    spCover.textContent = thumbUrl ? "" : "\u25B6";
    setCoverArt(thumbUrl, "\u25B6");
    showPlayer();
    if ("mediaSession" in navigator) {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: ytMeta.title, artist: "Bonge Radio (YouTube)",
        artwork: thumbUrl ? [{ src: thumbUrl, sizes: "512x512", type: "image/png" }] : []
      });
      navigator.mediaSession.setActionHandler("play", function(){ ytPlayer && ytPlayer.playVideo(); });
      navigator.mediaSession.setActionHandler("pause", function(){ ytPlayer && ytPlayer.pauseVideo(); });
      navigator.mediaSession.setActionHandler("previoustrack", null);
      navigator.mediaSession.setActionHandler("nexttrack", null);
    }
  }
  function stopYt(){
    if (ytReady && ytPlayer && ytPlayer.stopVideo) { try { ytPlayer.stopVideo(); } catch(e){} }
  }
  var ytProgressTimer = setInterval(function(){
    if (mode !== "yt" || !ytReady || !ytPlayer.getDuration) return;
    var d = ytPlayer.getDuration();
    if (d > 0) spFill.style.width = ((ytPlayer.getCurrentTime() / d) * 100) + "%";
    broadcastYtStatus();
  }, 500);

  // ---------------- postMessage bridge with iframe content ----------------
  function broadcastAudioStatus(){
    post({
      type: "bonge:audioStatus",
      active: mode === "track",
      playing: mode === "track" && !audio.paused,
      track: queue[queueIndex] || null,
      currentTime: audio.currentTime || 0,
      duration: audio.duration || 0
    });
  }
  function broadcastYtStatus(){
    post({
      type: "bonge:ytStatus",
      active: mode === "yt",
      playing: mode === "yt" && ytReady && ytPlayer.getPlayerState && ytPlayer.getPlayerState() === YT.PlayerState.PLAYING,
      title: ytMeta.title,
      thumbUrl: ytMeta.thumbUrl,
      currentTime: (ytReady && ytPlayer.getCurrentTime) ? ytPlayer.getCurrentTime() : 0,
      duration: (ytReady && ytPlayer.getDuration) ? ytPlayer.getDuration() : 0
    });
  }
  function post(msg){
    if (frame.contentWindow) frame.contentWindow.postMessage(msg, "*");
  }

  window.addEventListener("message", function(e){
    var msg = e.data;
    if (!msg || typeof msg !== "object") return;
    switch (msg.type) {
      case "bonge:playTrack":
        queue = msg.queue || [];
        playTrackAt(msg.index);
        break;
      case "bonge:toggleTrack":
        if (mode === "track") { if (audio.paused) audio.play(); else audio.pause(); }
        break;
      case "bonge:nextTrack":
        if (mode === "track") trackNext();
        break;
      case "bonge:prevTrack":
        if (mode === "track") trackPrev();
        break;
      case "bonge:seekTrack":
        if (mode === "track" && audio.duration) audio.currentTime = msg.pct * audio.duration;
        break;
      case "bonge:playYtAudio":
        playYtAudio(msg.videoId, msg.title, msg.thumbUrl, msg.startSeconds);
        break;
      case "bonge:toggleYt":
        if (mode === "yt" && ytReady) {
          var st = ytPlayer.getPlayerState();
          if (st === YT.PlayerState.PLAYING) ytPlayer.pauseVideo(); else ytPlayer.playVideo();
        }
        break;
      case "bonge:stopYt":
        if (mode === "yt") { stopYt(); mode = null; hidePlayer(); }
        break;
      case "bonge:seekYt":
        if (mode === "yt" && ytReady && ytPlayer.getDuration) {
          var dur = ytPlayer.getDuration();
          if (dur > 0) ytPlayer.seekTo(msg.pct * dur, true);
        }
        break;
      case "bonge:requestStatus":
        broadcastAudioStatus();
        broadcastYtStatus();
        break;
    }
  });

  // Re-send current status whenever a new page finishes loading in the iframe
  frame.addEventListener("load", function(){
    setTimeout(function(){
      broadcastAudioStatus();
      broadcastYtStatus();
    }, 300);
  });

  // ---------------- Service worker (top-level registration) ----------------
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js").catch(function(){});
  }
})();
</script>
</body>
</html>
