<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nduthi Flix — Profile</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
</head>
<body>

<div class="auth-screen" style="padding-bottom:110px;">
  <div class="auth-logo" style="font-size:2.2rem;">Your Profile</div>
  <div class="field">
    <label>Rider name</label>
    <input type="text" id="nameDisplay" disabled>
  </div>
  <div class="field">
    <label>Phone</label>
    <input type="text" id="phoneDisplay" disabled>
  </div>
  <div class="status-line" id="videoCount" style="text-align:center;"></div>
  <button class="btn-ghost" id="backBtn">Back to feed</button>
  <button class="btn-primary" id="signOutBtn" style="background:var(--hazard);">Sign out</button>
</div>

<div class="bottom-nav">
  <button class="nav-btn" id="navHome">
    <span class="nav-icon">🏠</span>
    <span class="nav-label">Home</span>
  </button>
  <button class="nav-btn" id="navPals">
    <span class="nav-icon">👥</span>
    <span class="nav-label">My Pals</span>
  </button>
  <button class="nav-btn upload" id="navUpload">
    <span class="nav-icon">+</span>
  </button>
  <button class="nav-btn" id="navBox">
    <span class="badge-dot"></span>
    <span class="nav-icon">💬</span>
    <span class="nav-label">My Box</span>
  </button>
  <button class="nav-btn active" id="navHood">
    <span class="nav-icon">👤</span>
    <span class="nav-label">My Hood</span>
  </button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
  auth.onAuthStateChanged(async (user) => {
    if (!user) { window.location.href = 'login.html'; return; }
    const doc = await db.collection('users').doc(user.uid).get();
    const data = doc.data() || {};
    document.getElementById('nameDisplay').value = data.displayName || '';
    document.getElementById('phoneDisplay').value = data.phone || user.phoneNumber || '';

    const vids = await db.collection('videos').where('uid', '==', user.uid).get();
    document.getElementById('videoCount').textContent = `${vids.size} veed${vids.size === 1 ? '' : 's'} posted`;
  });

  document.getElementById('backBtn').addEventListener('click', () => window.location.href = 'index.html');
  document.getElementById('signOutBtn').addEventListener('click', async () => {
    await auth.signOut();
    window.location.href = 'login.html';
  });
  document.getElementById('navHome').addEventListener('click', () => window.location.href = 'index.html');
  document.getElementById('navPals').addEventListener('click', () => window.location.href = 'friends.html');
  document.getElementById('navUpload').addEventListener('click', () => window.location.href = 'upload.html');
  document.getElementById('navBox').addEventListener('click', () => window.location.href = 'inbox.html');
</script>
</body>
</html>
