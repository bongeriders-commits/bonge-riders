<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nduthi Flix — My Box</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<style>
  .box-wrap { padding: 20px 16px 100px; }
  .box-header { font-family: var(--display); font-size: 1.6rem; margin-bottom: 16px; }
  .box-section {
    background: var(--steel); border: 1px solid var(--steel-line); border-radius: var(--radius);
    padding: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 14px;
  }
  .box-section .icon-ring {
    width: 44px; height: 44px; border-radius: 50%; background: var(--asphalt-2);
    display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0;
  }
  .box-section .box-body { flex: 1; min-width: 0; }
  .box-section .box-title { font-weight: 600; font-size: 0.92rem; }
  .box-section .box-sub { color: var(--chalk-dim); font-size: 0.8rem; margin-top: 2px; }
  .box-section .box-count {
    font-family: var(--mono); font-size: 0.75rem; color: var(--asphalt); background: var(--amber);
    border-radius: 10px; padding: 2px 8px; flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="box-wrap">
  <div class="box-header">My Box</div>

  <div class="box-section">
    <div class="icon-ring">💬</div>
    <div class="box-body">
      <div class="box-title">Inbox</div>
      <div class="box-sub">Direct messages from other riders</div>
    </div>
    <div class="box-count">0</div>
  </div>

  <div class="box-section">
    <div class="icon-ring">🙋</div>
    <div class="box-body">
      <div class="box-title">Friend requests</div>
      <div class="box-sub">People who want to follow you</div>
    </div>
    <div class="box-count">0</div>
  </div>

  <div class="box-section">
    <div class="icon-ring">✨</div>
    <div class="box-body">
      <div class="box-title">Suggestions</div>
      <div class="box-sub">Riders you might know</div>
    </div>
    <div class="box-count">0</div>
  </div>

  <div class="box-section">
    <div class="icon-ring">❤️</div>
    <div class="box-body">
      <div class="box-title">Likes</div>
      <div class="box-sub">Who liked your veeds</div>
    </div>
    <div class="box-count">0</div>
  </div>

  <div class="box-section">
    <div class="icon-ring">👁️</div>
    <div class="box-body">
      <div class="box-title">Page views</div>
      <div class="box-sub">Who's checked out your profile</div>
    </div>
    <div class="box-count">0</div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn" id="navHome">
    <span class="nav-icon">🏠</span>
    <span class="nav-label">Home</span>
  </button>
  <button class="nav-btn" id="navPals">
    <span class="nav-icon">👥</span>
    <span class="nav-label">My Pals</span>
  </button>
  <button class="nav-btn upload" id="navUpload">
    <span class="nav-icon">+</span>
  </button>
  <button class="nav-btn active" id="navBox">
    <span class="nav-icon">💬</span>
    <span class="nav-label">My Box</span>
  </button>
  <button class="nav-btn" id="navHood">
    <span class="nav-icon">👤</span>
    <span class="nav-label">My Hood</span>
  </button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
  auth.onAuthStateChanged((user) => {
    if (!user) { window.location.href = 'login.html'; return; }
    // TODO: wire each section to real data once built:
    // - Inbox: messages/{uid}/threads
    // - Friend requests: users/{uid}/followRequests
    // - Suggestions: simple mutual-follow or same-stage heuristic
    // - Likes: users/{uid}/notifications where type == 'like'
    // - Page views: users/{uid}/profileViews
  });

  document.getElementById('navHome').addEventListener('click', () => window.location.href = 'index.html');
  document.getElementById('navPals').addEventListener('click', () => window.location.href = 'friends.html');
  document.getElementById('navUpload').addEventListener('click', () => window.location.href = 'upload.html');
  document.getElementById('navHood').addEventListener('click', () => window.location.href = 'profile.html');
</script>
</body>
</html>
