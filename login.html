<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a1a3c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bogonko ROSCA">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Bogonko ROSCA</title>
<style>
  :root{
    --navy-deep:#0a1a3c;
    --navy:#0e2a5e;
    --navy-light:#16386f;
    --gold:#e8ab2f;
    --gold-light:#f5c85a;
    --cream:#fbf9f4;
    --ink:#0a1a3c;
    --muted:#7c8aa8;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    background:var(--navy-deep);
    overflow:hidden;
    -webkit-tap-highlight-color:transparent;
  }
  .device{
    position:relative;
    width:100%;
    height:100vh;
    max-width:520px;
    margin:0 auto;
    overflow:hidden;
  }

  /* ---------- SPLASH SCREEN ---------- */
  #splash{
    position:fixed;
    inset:0;
    max-width:520px;
    margin:0 auto;
    background:
      radial-gradient(circle at 50% 38%, rgba(232,171,47,0.10), transparent 55%),
      linear-gradient(160deg, var(--navy-deep) 0%, var(--navy) 55%, #081530 100%);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:100;
    animation: fadeOutSplash 0.8s ease 2.6s forwards;
  }
  #splash::before{
    content:"";
    position:absolute;
    width:140%;
    height:140%;
    background:
      repeating-radial-gradient(circle at 50% 0%, transparent 0 90px, rgba(232,171,47,0.035) 90px 91px);
    animation: rotateRing 30s linear infinite;
    opacity:0.6;
  }
  .splash-logo-wrap{
    width:190px;
    height:190px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:radial-gradient(circle, rgba(255,255,255,0.06), transparent 70%);
    animation: logoPop 0.9s cubic-bezier(.2,.9,.25,1.1) both;
    position:relative;
    z-index:2;
  }
  .splash-logo-wrap img{
    width:100%;
    height:100%;
    object-fit:contain;
    filter: drop-shadow(0 8px 28px rgba(0,0,0,0.45));
  }
  .splash-title{
    margin-top:22px;
    color:#fff;
    font-size:30px;
    font-weight:800;
    letter-spacing:3px;
    opacity:0;
    animation: riseIn 0.7s ease 0.5s forwards;
    position:relative;
    z-index:2;
  }
  .splash-sub{
    margin-top:6px;
    color:var(--gold-light);
    font-size:13px;
    letter-spacing:6px;
    font-weight:600;
    opacity:0;
    animation: riseIn 0.7s ease 0.65s forwards;
    position:relative;
    z-index:2;
  }
  .splash-tag{
    margin-top:14px;
    color:rgba(255,255,255,0.6);
    font-size:12.5px;
    font-style:italic;
    opacity:0;
    letter-spacing:0.3px;
    animation: riseIn 0.7s ease 0.85s forwards;
    position:relative;
    z-index:2;
  }
  .splash-loader{
    margin-top:38px;
    width:130px;
    height:3px;
    border-radius:2px;
    background:rgba(255,255,255,0.12);
    overflow:hidden;
    opacity:0;
    animation: riseIn 0.5s ease 1.1s forwards;
    position:relative;
    z-index:2;
  }
  .splash-loader::after{
    content:"";
    display:block;
    height:100%;
    width:40%;
    border-radius:2px;
    background:linear-gradient(90deg, var(--gold), var(--gold-light));
    animation: loaderSlide 1.3s ease-in-out infinite;
  }

  @keyframes rotateRing{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
  }
  @keyframes logoPop{
    0%{ transform:scale(0.6); opacity:0; }
    100%{ transform:scale(1); opacity:1; }
  }
  @keyframes riseIn{
    from{ transform:translateY(10px); opacity:0; }
    to{ transform:translateY(0); opacity:1; }
  }
  @keyframes loaderSlide{
    0%{ transform:translateX(-120%); }
    100%{ transform:translateX(360%); }
  }
  @keyframes fadeOutSplash{
    to{ opacity:0; visibility:hidden; pointer-events:none; }
  }

  /* ---------- LOGIN SCREEN ---------- */
  #login{
    position:relative;
    height:100%;
    background:linear-gradient(170deg, var(--navy-deep) 0%, var(--navy) 60%, var(--navy-light) 100%);
    display:flex;
    flex-direction:column;
    align-items:center;
    opacity:0;
    animation: loginIn 0.7s ease 2.9s forwards;
  }
  @keyframes loginIn{
    from{ opacity:0; }
    to{ opacity:1; }
  }
  #login::before{
    content:"";
    position:absolute;
    top:0; left:0; right:0;
    height:64%;
    background:
      radial-gradient(circle at 20% 10%, rgba(232,171,47,0.08), transparent 45%),
      radial-gradient(circle at 85% 5%, rgba(255,255,255,0.05), transparent 40%);
    pointer-events:none;
  }

  .top-arc{
    position:relative;
    width:100%;
    padding:38px 30px 26px;
    text-align:center;
    z-index:2;
    flex-shrink:0;
  }
  .brand-logo{
    width:96px;
    height:96px;
    margin:0 auto 14px;
    display:block;
    filter: drop-shadow(0 6px 16px rgba(0,0,0,0.4));
  }
  .brand-title{
    color:#fff;
    font-size:34px;
    font-weight:800;
    letter-spacing:2px;
    line-height:1;
  }
  .brand-title-divider{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-top:10px;
  }
  .brand-title-divider span{
    display:inline-block;
    height:1px;
    width:34px;
    background:var(--gold);
    opacity:0.8;
  }
  .brand-title-divider b{
    color:var(--gold);
    font-size:20px;
    font-weight:700;
    letter-spacing:6px;
  }
  .brand-sub{
    margin-top:12px;
    color:rgba(255,255,255,0.72);
    font-size:13.5px;
    font-style:italic;
    letter-spacing:0.2px;
  }

  .wave{
    position:relative;
    width:100%;
    line-height:0;
    z-index:2;
    flex-shrink:0;
  }
  .wave svg{ display:block; width:100%; height:32px; }

  .card{
    position:relative;
    z-index:2;
    background:var(--cream);
    width:calc(100% - 44px);
    max-width:460px;
    border-radius:22px;
    padding:30px 26px 26px;
    box-shadow:0 20px 45px rgba(0,0,0,0.35);
    margin-top:-2px;
  }
  .card h2{
    text-align:center;
    color:var(--navy-deep);
    font-size:19px;
    letter-spacing:1.5px;
    font-weight:800;
  }
  .card p.hint{
    text-align:center;
    color:#8a8f9c;
    font-size:13px;
    margin-top:6px;
  }
  .hr-accent{
    width:44px;
    height:3px;
    background:var(--gold);
    border-radius:3px;
    margin:12px auto 20px;
  }

  .field{
    position:relative;
    margin-bottom:16px;
  }
  .field input{
    width:100%;
    border:1.5px solid #e4e2da;
    background:#fff;
    border-radius:12px;
    padding:15px 16px 15px 46px;
    font-size:14.5px;
    color:var(--ink);
    outline:none;
    transition:border-color .2s, box-shadow .2s;
  }
  .field input::placeholder{ color:#a7acba; }
  .field input:focus{
    border-color:var(--gold);
    box-shadow:0 0 0 3px rgba(232,171,47,0.18);
  }
  .field .icon{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    width:18px;
    height:18px;
    color:var(--navy);
    opacity:0.65;
  }
  .field .icon svg{ width:100%; height:100%; }
  .toggle-eye{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    background:none;
    border:none;
    cursor:pointer;
    color:#9aa0ad;
    padding:4px;
    display:flex;
  }
  .toggle-eye svg{ width:19px; height:19px; }

  .login-btn{
    width:100%;
    background:linear-gradient(135deg, var(--navy) 0%, var(--navy-deep) 100%);
    color:#fff;
    border:none;
    border-radius:12px;
    padding:15px;
    font-size:15px;
    font-weight:700;
    letter-spacing:2px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    cursor:pointer;
    margin-top:4px;
    transition:transform .15s, box-shadow .15s;
    box-shadow:0 10px 20px rgba(10,26,60,0.28);
  }
  .login-btn:active{ transform:translateY(1px) scale(0.99); }
  .login-btn svg{ width:17px; height:17px; }

  .row-between{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:16px;
    font-size:13px;
  }
  .remember{
    display:flex;
    align-items:center;
    gap:8px;
    color:#555a68;
  }
  .remember input{
    width:16px;
    height:16px;
    accent-color:var(--navy);
  }
  .forgot{
    color:var(--navy);
    text-decoration:none;
    font-weight:600;
  }

  .stats{
    z-index:2;
    width:calc(100% - 44px);
    max-width:460px;
    margin:22px auto 0;
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:12px;
    flex:1;
  }
  .stat{
    border:1px solid rgba(232,171,47,0.4);
    border-radius:12px;
    padding:14px 8px;
    text-align:center;
    color:var(--gold-light);
    background:rgba(255,255,255,0.02);
  }
  .stat svg{ width:24px; height:24px; margin-bottom:8px; color:var(--gold); }
  .stat .label{
    display:block;
    color:#fff;
    font-size:11px;
    font-weight:700;
    letter-spacing:0.5px;
    margin-top:2px;
    line-height:1.3;
  }

  .footer-note{
    z-index:2;
    text-align:center;
    color:rgba(255,255,255,0.55);
    font-size:11.5px;
    padding:18px 20px 22px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
  }
  .footer-note svg{ width:12px; height:12px; }

  @media (max-height: 700px){
    .top-arc{ padding:24px 30px 16px; }
    .brand-logo{ width:74px; height:74px; margin-bottom:10px; }
    .brand-title{ font-size:28px; }
    .card{ padding:22px 22px 20px; }
    .field{ margin-bottom:12px; }
    .stats{ margin-top:16px; }
  }
</style>
</head>

    <div class="brand-title">BOGONKO</div>
    <div class="brand-title-divider"><span></span><b>ROSCA</b><span></span></div>
    <div class="brand-sub">Rotating Savings.</div>
  </div>

  <div class="wave">
    <svg viewBox="0 0 500 32" preserveAspectRatio="none">
      <path d="M0,32 C150,0 350,0 500,28 L500,32 L0,32 Z" fill="#fbf9f4"></path>
    </svg>
  </div>

  <div class="card">
    <h2>WELCOME BACK</h2>
    <p class="hint">Please login to continue</p>
    <div class="hr-accent"></div>

    <form onsubmit="return checkLogin();">
      <div class="field">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </span>
        <input id="user" type="text" placeholder="Full Name or Admin Username" autocomplete="username">
      </div>

      <div class="field">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        </span>
        <input id="pw" type="password" placeholder="Password" autocomplete="current-password">
        <button type="button" class="toggle-eye" onclick="togglePw()" aria-label="Show password">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        </button>
      </div>

      <div id="loginError" style="display:none; color:#d63b3b; font-size:13px; margin:-6px 0 14px; text-align:center;">
        Invalid username or password.
      </div>

      <button type="submit" class="login-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
        LOGIN
      </button>

      <div class="row-between">
        <label class="remember">
          <input type="checkbox" checked>
          Remember me
        </label>
        <a class="forgot" href="#">Forgot Password?</a>
      </div>
    </form>
  </div>

  <div class="footer-note">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
    Secure. Simple. Reliable.
  </div>
</div>

<script>
  // TEMPORARY credentials for testing/demo purposes only.
  // Replace with real authentication (Firebase Auth, etc.) before going live.
  // The admin still uses the fixed username/password below. Each member
  // logs in with their full NAME + their own designated password (their
  // phone number's last 4 digits) — no email involved. The app looks the
  // name up in MEMBERS and routes to the right portal automatically.
  const ADMIN_USERNAME = 'bogonko_admin';
  const ADMIN_PASSWORD = 'Rosca2026!';

  // Keep this list in sync with the MEMBERS array in member-portal.html.
  // password = last 4 digits of the member's phone on file.
  const MEMBERS = [
    {order:1,  name:"John Mwangi",     phone:"0712 345 678"},
    {order:2,  name:"Mary Wanjiku",    phone:"0721 234 567"},
    {order:3,  name:"Peter Kamau",     phone:"0733 456 789"},
    {order:4,  name:"Grace Njeri",     phone:"0708 123 456"},
    {order:5,  name:"David Ochieng",   phone:"0745 678 901"},
    {order:6,  name:"Sarah Akinyi",    phone:"0790 234 567"},
    {order:7,  name:"James Otieno",    phone:"0726 345 678"},
    {order:8,  name:"Beatrice Moraa",  phone:"0783 456 789"},
    {order:9,  name:"Samuel Kiptoo",   phone:"0715 678 901"},
  ];
  for (let i = 10; i <= 30; i++){
    MEMBERS.push({order:i, name:"Member "+i, phone:"07"+(10+i)+" 000 0"+(100+i)});
  }
  function lastFour(phone){ return phone.replace(/\D/g,'').slice(-4); }

  function checkLogin(){
    const userRaw = document.getElementById('user').value.trim();
    const pass = document.getElementById('pw').value;
    const errorBox = document.getElementById('loginError');

    const isAdmin = userRaw === ADMIN_USERNAME && pass === ADMIN_PASSWORD;
    const member = MEMBERS.find(m => m.name.toLowerCase() === userRaw.toLowerCase());
    const isMember = member && pass === lastFour(member.phone);

    if (isAdmin){
      errorBox.style.display = 'none';
      localStorage.setItem('bogonkoRole', 'admin');
      window.location.href = 'dashboard.html';
    } else if (isMember){
      errorBox.style.display = 'none';
      localStorage.setItem('bogonkoRole', 'member');
      localStorage.setItem('bogonkoMemberName', member.name);
      window.location.href = 'member-portal.html';
    } else {
      errorBox.style.display = 'block';
    }
    return false;
  }

  function togglePw(){
    const pw = document.getElementById('pw');
    const eye = document.getElementById('eyeIcon');
    if(pw.type === 'password'){
      pw.type = 'text';
      eye.innerHTML = '<path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.5 18.5 0 0 1 5.06-5.94M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
    } else {
      pw.type = 'password';
      eye.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
    }
  }

  // Skip splash if tapped
  document.getElementById('splash').addEventListener('click', function(){
    this.style.animation = 'none';
    this.style.opacity = '0';
    this.style.visibility = 'hidden';
    document.getElementById('login').style.animation = 'none';
    document.getElementById('login').style.opacity = '1';
  });
</script>


<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
