<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>News — Bonge Riders</title>
<link rel="icon" href="icon-32.png">
<style>
:root {
  --bg: #0E1013;
  --bg2: #171A20;
  --card: #1B1E25;
  --card2: #242832;
  --border: #333844;
  --text: #F3F4F6;
  --muted: #9CA3AF;
  --dim: #6B7280;
  --amber: #E02020;
  --amber2: #FF4747;
  --amber-bg: rgba(224,32,32,0.18);
  --radius: 10px;
  --radius-lg:14px;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  margin:0; background:var(--bg); color:var(--text);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  padding-bottom:40px;
}
header {
  position:sticky; top:0; z-index:20;
  background:var(--bg2); border-bottom:1px solid var(--border);
  padding:14px 16px; display:flex; align-items:center; gap:10px;
}
.back-btn {
  background:var(--card2); border:1px solid var(--border); color:var(--text);
  width:36px; height:36px; border-radius:50%; display:flex; align-items:center;
  justify-content:center; font-size:18px; cursor:pointer; flex-shrink:0;
}
.back-btn:active { background:var(--amber-bg); }
h1 { font-size:18px; font-weight:800; margin:0; font-family:'Space Grotesk',sans-serif; }
.refresh-btn {
  margin-left:auto; background:none; border:none; color:var(--amber);
  font-size:20px; cursor:pointer; width:36px; height:36px; border-radius:50%;
}
.refresh-btn.spin { animation: spin 0.9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.tabs {
  display:flex; gap:8px; overflow-x:auto; padding:12px 16px 4px;
  scrollbar-width:none;
}
.tabs::-webkit-scrollbar { display:none; }
.tab {
  flex-shrink:0; padding:7px 14px; border-radius:999px; border:1px solid var(--border);
  background:var(--card2); color:var(--muted); font-size:13px; font-weight:700;
  cursor:pointer; white-space:nowrap;
}
.tab.active { background:var(--amber-bg); border-color:var(--amber); color:var(--amber2); }

.source-row {
  display:flex; gap:8px; overflow-x:auto; padding:6px 16px 12px; scrollbar-width:none;
}
.source-row::-webkit-scrollbar { display:none; }
.src-chip {
  flex-shrink:0; padding:5px 12px; border-radius:999px; border:1px solid var(--border);
  background:var(--card); color:var(--dim); font-size:11.5px; font-weight:700;
  cursor:pointer; white-space:nowrap;
}
.src-chip.active { color:var(--text); border-color:var(--muted); }
.src-chip.error { opacity:0.4; text-decoration:line-through; }

#feed { padding:4px 16px 20px; display:flex; flex-direction:column; gap:12px; }

.article {
  display:flex; gap:12px; background:var(--card); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:12px; text-decoration:none; color:var(--text);
}
.article:active { background:var(--card2); }
.article img {
  width:88px; height:88px; object-fit:cover; border-radius:var(--radius);
  flex-shrink:0; background:var(--card2);
}
.article-body { display:flex; flex-direction:column; min-width:0; }
.article-title {
  font-size:14.5px; font-weight:700; line-height:1.35; margin:0 0 6px;
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
}
.article-meta {
  margin-top:auto; display:flex; align-items:center; gap:6px; font-size:11px; color:var(--dim);
}
.article-source {
  color:var(--amber2); font-weight:700; text-transform:uppercase; letter-spacing:0.3px;
}

.state-msg {
  text-align:center; color:var(--muted); font-size:13px; padding:40px 20px; line-height:1.6;
}
.skeleton {
  display:flex; gap:12px; background:var(--card); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:12px;
}
.skeleton .img-ph { width:88px; height:88px; border-radius:var(--radius); background:var(--card2); flex-shrink:0; }
.skeleton .lines { flex:1; display:flex; flex-direction:column; gap:8px; justify-content:center; }
.skeleton .line { height:10px; border-radius:4px; background:var(--card2); }
.skeleton .line.w1 { width:100%; }
.skeleton .line.w2 { width:80%; }
.skeleton .line.w3 { width:40%; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
.skeleton .img-ph, .skeleton .line { animation: pulse 1.3s ease-in-out infinite; }
</style>
</head>
<body>

<header>
  <button class="back-btn" onclick="goBack()">‹</button>
  <h1>News</h1>
  <button class="refresh-btn" id="refreshBtn" onclick="loadAll(true)" aria-label="Refresh">⟳</button>
</header>

<div class="tabs" id="tabs">
  <button class="tab active" data-cat="all" onclick="setCategory('all')">All</button>
  <button class="tab" data-cat="kenya" onclick="setCategory('kenya')">Kenya</button>
  <button class="tab" data-cat="world" onclick="setCategory('world')">World</button>
  <button class="tab" data-cat="business" onclick="setCategory('business')">Business</button>
  <button class="tab" data-cat="sports" onclick="setCategory('sports')">Sports</button>
</div>

<div class="source-row" id="sourceRow"></div>

<div id="feed">
  <div class="skeleton"><div class="img-ph"></div><div class="lines"><div class="line w1"></div><div class="line w2"></div><div class="line w3"></div></div></div>
  <div class="skeleton"><div class="img-ph"></div><div class="lines"><div class="line w1"></div><div class="line w2"></div><div class="line w3"></div></div></div>
  <div class="skeleton"><div class="img-ph"></div><div class="lines"><div class="line w1"></div><div class="line w2"></div><div class="line w3"></div></div></div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// FREE NEWS SOURCES (public RSS feeds — no API key required)
// Each feed is fetched client-side through a public CORS proxy
// since browsers block direct cross-origin XML requests.
// ─────────────────────────────────────────────────────────────
const SOURCES = [
  { id:'aljazeera', name:'Al Jazeera', cat:'world',    url:'https://www.aljazeera.com/xml/rss/all.xml' },
  { id:'bbc',       name:'BBC News',   cat:'world',    url:'https://feeds.bbci.co.uk/news/world/rss.xml' },
  { id:'guardian',  name:'The Guardian', cat:'world',  url:'https://www.theguardian.com/world/rss' },
  { id:'npr',       name:'NPR',        cat:'world',    url:'https://feeds.npr.org/1004/rss.xml' },
  { id:'nation',    name:'Nation Kenya', cat:'kenya',  url:'https://nation.africa/kenya/rss' },
  { id:'standard',  name:'The Standard', cat:'kenya',  url:'https://www.standardmedia.co.ke/rss/headlines.php' },
  { id:'capitalke', name:'Capital FM',  cat:'kenya',   url:'https://www.capitalfm.co.ke/news/feed/' },
  { id:'bbcbiz',    name:'BBC Business', cat:'business', url:'https://feeds.bbci.co.uk/news/business/rss.xml' },
  { id:'aljbiz',    name:'AJ Economy', cat:'business', url:'https://www.aljazeera.com/xml/rss/economy.xml' },
  { id:'bbcsport',  name:'BBC Sport',  cat:'sports',   url:'https://feeds.bbci.co.uk/sport/rss.xml' },
];

// Proxies tried in order until one works for a given feed
const PROXIES = [
  u => `https://proxy.corsfix.com/?${u}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];

let currentCategory = 'all';
let allArticles = []; // {title, link, date, source, img}
let sourceStatus = {}; // id -> 'ok' | 'error' | 'loading'

function goBack(){
  if (document.referrer) history.back(); else location.href = 'index.html';
}

function renderSourceChips(){
  const row = document.getElementById('sourceRow');
  row.innerHTML = SOURCES
    .filter(s => currentCategory==='all' || s.cat===currentCategory)
    .map(s => `<button class="src-chip ${sourceStatus[s.id]==='error'?'error':''}" title="${sourceStatus[s.id]||''}">${s.name}</button>`)
    .join('');
}

function setCategory(cat){
  currentCategory = cat;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.cat===cat));
  renderSourceChips();
  renderFeed();
}

function stripCdata(s){ return (s||'').replace(/<!\[CDATA\[|\]\]>/g,'').trim(); }

function extractImage(itemEl, descHtml){
  // Try media:content, enclosure, then first <img> in description
  const media = itemEl.getElementsByTagName('media:content')[0] || itemEl.getElementsByTagName('media:thumbnail')[0];
  if (media && media.getAttribute('url')) return media.getAttribute('url');
  const enclosure = itemEl.getElementsByTagName('enclosure')[0];
  if (enclosure && enclosure.getAttribute('url') && (enclosure.getAttribute('type')||'').includes('image')) return enclosure.getAttribute('url');
  if (descHtml){
    const m = descHtml.match(/<img[^>]+src="([^"]+)"/i);
    if (m) return m[1];
  }
  return null;
}

async function fetchFeed(source){
  sourceStatus[source.id] = 'loading';
  for (const buildProxyUrl of PROXIES){
    try{
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 9000);
      const res = await fetch(buildProxyUrl(source.url), { cache:'no-store', signal: controller.signal });
      clearTimeout(timeout);
      if (!res.ok) continue;
      const text = await res.text();
      if (!text || text.length < 20) continue;
      const xml = new DOMParser().parseFromString(text, 'text/xml');
      if (xml.querySelector('parsererror')) continue;
      const items = [...xml.querySelectorAll('item')].slice(0, 12);
      if (!items.length) continue;

      const articles = items.map(it => {
        const title = stripCdata(it.querySelector('title')?.textContent);
        const link = stripCdata(it.querySelector('link')?.textContent) || it.querySelector('link')?.getAttribute('href');
        const pubDate = it.querySelector('pubDate')?.textContent || it.querySelector('date')?.textContent;
        const descRaw = it.querySelector('description')?.textContent || '';
        const img = extractImage(it, stripCdata(descRaw));
        return {
          title, link,
          date: pubDate ? new Date(pubDate) : new Date(0),
          source: source.name,
          img
        };
      }).filter(a => a.title && a.link);

      sourceStatus[source.id] = 'ok';
      return articles;
    } catch(e){ /* try next proxy */ }
  }
  sourceStatus[source.id] = 'error';
  return [];
}

async function loadAll(isRefresh){
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spin');
  if (!isRefresh){
    document.getElementById('feed').innerHTML = Array(4).fill(
      `<div class="skeleton"><div class="img-ph"></div><div class="lines"><div class="line w1"></div><div class="line w2"></div><div class="line w3"></div></div></div>`
    ).join('');
  }
  const results = await Promise.all(SOURCES.map(fetchFeed));
  allArticles = results.flat().sort((a,b) => b.date - a.date);
  renderSourceChips();
  renderFeed();
  btn.classList.remove('spin');
}

function timeAgo(date){
  const diffMs = Date.now() - date.getTime();
  const mins = Math.floor(diffMs/60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins/60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs/24);
  if (days < 7) return `${days}d ago`;
  return date.toLocaleDateString();
}

function renderFeed(){
  const feedEl = document.getElementById('feed');
  const catSourceNames = new Set(
    SOURCES.filter(s => currentCategory==='all' || s.cat===currentCategory).map(s=>s.name)
  );
  const list = allArticles.filter(a => catSourceNames.has(a.source));

  if (!list.length){
    const anyLoading = Object.values(sourceStatus).some(v=>v==='loading');
    feedEl.innerHTML = `<div class="state-msg">${anyLoading ? 'Loading headlines…' : 'No headlines available right now.<br>Pull to refresh or check back shortly.'}</div>`;
    return;
  }

  feedEl.innerHTML = list.slice(0, 60).map(a => `
    <a class="article" href="${a.link}" target="_blank" rel="noopener noreferrer">
      ${a.img ? `<img src="${a.img}" alt="" loading="lazy" onerror="this.style.display='none'">` : ''}
      <div class="article-body">
        <p class="article-title">${escapeHtml(a.title)}</p>
        <div class="article-meta">
          <span class="article-source">${escapeHtml(a.source)}</span>
          <span>·</span>
          <span>${timeAgo(a.date)}</span>
        </div>
      </div>
    </a>
  `).join('');
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

renderSourceChips();
loadAll(false);
</script>
</body>
</html>
