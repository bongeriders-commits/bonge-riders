<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>News — Bonge Riders</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F7F8FA">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-180.png">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F8FA;
  --bg2: #FFFFFF;
  --card: #FFFFFF;
  --card2: #F2F3F6;
  --border: #E2E5EC;
  --text: #111827;
  --muted: #6B7280;
  --dim: #9CA3AF;
  --amber: #CC1818;
  --amber2: #E02020;
  --amber-bg: rgba(204,24,24,0.10);
  --radius: 10px;
  --radius-lg:14px;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  margin:0; background:var(--bg); color:var(--text);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  padding-bottom:40px;
}
header {
  position:sticky; top:0; z-index:20;
  background:var(--bg2); border-bottom:1px solid var(--border);
  padding:14px 16px; display:flex; align-items:center; gap:10px;
}
.back-btn {
  background:var(--card2); border:1px solid var(--border); color:var(--text);
  width:36px; height:36px; border-radius:50%; display:flex; align-items:center;
  justify-content:center; font-size:18px; cursor:pointer; flex-shrink:0;
}
.back-btn:active { background:var(--amber-bg); }
.topbar-logo {
  width:30px; height:30px; border-radius:50%; object-fit:cover; flex-shrink:0;
}
h1 { font-size:18px; font-weight:800; margin:0; font-family:'Space Grotesk',sans-serif; }
.menu-wrap { margin-left:auto; position:relative; }
.kebab-btn {
  background:none; border:none; color:var(--text);
  font-size:20px; cursor:pointer; width:36px; height:36px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
}
.kebab-btn:active { background:var(--card2); }
.menu-dropdown {
  position:absolute; top:42px; right:0; min-width:160px;
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  box-shadow:0 8px 24px rgba(17,24,39,0.12); overflow:hidden;
  opacity:0; visibility:hidden; transform:translateY(-6px);
  transition:opacity .15s ease, transform .15s ease; z-index:30;
}
.menu-dropdown.open { opacity:1; visibility:visible; transform:translateY(0); }
.menu-item {
  display:flex; align-items:center; gap:8px; width:100%; padding:11px 14px;
  background:none; border:none; color:var(--text); font-size:14px; font-weight:600;
  font-family:'Inter',sans-serif; cursor:pointer; text-align:left;
}
.menu-item:active { background:var(--card2); }
.menu-item .ic { font-size:15px; color:var(--amber); flex-shrink:0; }
.menu-item .ic.spin { display:inline-block; animation: spin 0.9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.tabs {
  display:flex; gap:8px; overflow-x:auto; padding:12px 16px 4px;
  scrollbar-width:none;
}
.tabs::-webkit-scrollbar { display:none; }
.tab {
  flex-shrink:0; padding:7px 14px; border-radius:999px; border:1px solid var(--border);
  background:var(--card2); color:var(--muted); font-size:13px; font-weight:700;
  cursor:pointer; white-space:nowrap;
}
.tab.active { background:var(--amber-bg); border-color:var(--amber); color:var(--amber2); }

.source-row {
  display:flex; gap:8px; overflow-x:auto; padding:6px 16px 12px; scrollbar-width:none;
}
.source-row::-webkit-scrollbar { display:none; }
.src-chip {
  flex-shrink:0; padding:5px 12px; border-radius:999px; border:1px solid var(--border);
  background:var(--card); color:var(--dim); font-size:11.5px; font-weight:700;
  cursor:pointer; white-space:nowrap;
}
.src-chip.active { color:var(--text); border-color:var(--muted); }
.src-chip.error { opacity:0.4; text-decoration:line-through; }

#feed { padding:4px 16px 20px; display:flex; flex-direction:column; gap:12px; }

.article {
  display:flex; gap:12px; background:var(--card); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:12px; text-decoration:none; color:var(--text);
}
.article:active { background:var(--card2); }
.article img {
  width:88px; height:88px; object-fit:cover; border-radius:var(--radius);
  flex-shrink:0; background:var(--card2);
}
.article-body { display:flex; flex-direction:column; min-width:0; }
.article-title {
  font-size:14.5px; font-weight:700; line-height:1.35; margin:0 0 6px;
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
}
.article-meta {
  margin-top:auto; display:flex; align-items:center; gap:6px; font-size:11px; color:var(--dim);
}
.article-source {
  color:var(--amber2); font-weight:700; text-transform:uppercase; letter-spacing:0.3px;
}

.state-msg {
  text-align:center; color:var(--muted); font-size:13px; padding:40px 20px; line-height:1.6;
}
@keyframes brandspin{to{transform:rotate(360deg);}}
.brand-spinner-lg{display:block;width:26px;height:26px;margin:0 auto 10px;border:3px solid var(--border);border-top-color:var(--amber2);border-radius:50%;animation:brandspin .7s linear infinite;}
.skeleton {
  display:flex; gap:12px; background:var(--card); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:12px;
}
.skeleton .img-ph { width:88px; height:88px; border-radius:var(--radius); background:var(--card2); flex-shrink:0; }
.skeleton .lines { flex:1; display:flex; flex-direction:column; gap:8px; justify-content:center; }
.skeleton .line { height:10px; border-radius:4px; background:var(--card2); }
.skeleton .line.w1 { width:100%; }
.skeleton .line.w2 { width:80%; }
.skeleton .line.w3 { width:40%; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
.skeleton .img-ph, .skeleton .line { animation: pulse 1.3s ease-in-out infinite; }
</style>
</head>
<body>

<header>
  <button class="back-btn" onclick="goBack()">‹</button>
  <img src="icon-192.png" alt="Bonge Riders" class="topbar-logo">
  <h1>News</h1>
  <div class="menu-wrap">
    <button class="kebab-btn" id="menuBtn" onclick="toggleMenu(event)" aria-label="More options">⋮</button>
    <div class="menu-dropdown" id="menuDropdown">
      <button class="menu-item" id="refreshItem" onclick="loadAll(true); toggleMenu();">
        <span class="ic" id="refreshIcon">⟳</span> Refresh
      </button>
    </div>
  </div>
</header>

<div class="tabs" id="tabs">
  <button class="tab active" data-cat="all" onclick="setCategory('all')">All</button>
  <button class="tab" data-cat="kenya" onclick="setCategory('kenya')">Kenya</button>
  <button class="tab" data-cat="world" onclick="setCategory('world')">World</button>
  <button class="tab" data-cat="business" onclick="setCategory('business')">Business</button>
  <button class="tab" data-cat="sports" onclick="setCategory('sports')">Sports</button>
</div>

<div class="source-row" id="sourceRow"></div>

<div id="feed">
  <div class="skeleton"><div class="img-ph"></div><div class="lines"><div class="line w1"></div><div class="line w2"></div><div class="line w3"></div></div></div>
  <div class="skeleton"><div class="img-ph"></div><div class="lines"><div class="line w1"></div><div class="line w2"></div><div class="line w3"></div></div></div>
  <div class="skeleton"><div class="img-ph"></div><div class="lines"><div class="line w1"></div><div class="line w2"></div><div class="line w3"></div></div></div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// News is fetched from our own /api/news serverless function,
// which pulls RSS feeds server-side (no browser CORS issues,
// no dependency on third-party proxies).
// ─────────────────────────────────────────────────────────────
const SOURCE_META = [
  { id:'aljazeera', name:'Al Jazeera',   cat:'world' },
  { id:'bbc',       name:'BBC News',     cat:'world' },
  { id:'guardian',  name:'The Guardian', cat:'world' },
  { id:'npr',       name:'NPR',          cat:'world' },
  { id:'nation',    name:'Nation Kenya', cat:'kenya' },
  { id:'standard',  name:'The Standard', cat:'kenya' },
  { id:'capitalke', name:'Capital FM',   cat:'kenya' },
  { id:'bbcbiz',    name:'BBC Business', cat:'business' },
  { id:'aljbiz',    name:'AJ Economy',   cat:'business' },
  { id:'bbcsport',  name:'BBC Sport',    cat:'sports' },
];

let currentCategory = 'all';
let allArticles = []; // {title, link, date, source, cat, img}
let sourceStatus = {}; // id -> 'ok' | 'error' | 'loading'

function goBack(){
  if (document.referrer) history.back(); else location.href = 'home.html';
}

function toggleMenu(e){
  if (e) e.stopPropagation();
  document.getElementById('menuDropdown').classList.toggle('open');
}
document.addEventListener('click', (e)=>{
  const wrap = document.querySelector('.menu-wrap');
  if (wrap && !wrap.contains(e.target)) document.getElementById('menuDropdown').classList.remove('open');
});

function renderSourceChips(){
  const row = document.getElementById('sourceRow');
  row.innerHTML = SOURCE_META
    .filter(s => currentCategory==='all' || s.cat===currentCategory)
    .map(s => `<button class="src-chip ${sourceStatus[s.id]==='error'?'error':''}" title="${sourceStatus[s.id]||''}">${s.name}</button>`)
    .join('');
}

function setCategory(cat){
  currentCategory = cat;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.cat===cat));
  renderSourceChips();
  renderFeed();
}

async function loadAll(isRefresh){
  const icon = document.getElementById('refreshIcon');
  icon.classList.add('spin');
  if (!isRefresh){
    document.getElementById('feed').innerHTML = Array(4).fill(
      `<div class="skeleton"><div class="img-ph"></div><div class="lines"><div class="line w1"></div><div class="line w2"></div><div class="line w3"></div></div></div>`
    ).join('');
  }
  try{
    const res = await fetch('/api/news?cat=all', { cache:'no-store' });
    if (!res.ok) throw new Error('bad status ' + res.status);
    const data = await res.json();
    allArticles = (data.articles || []).map(a => ({ ...a, date: a.date ? new Date(a.date) : new Date(0) }));
    (data.sources || []).forEach(s => { sourceStatus[s.id] = s.ok ? 'ok' : 'error'; });
  } catch(e){
    allArticles = [];
    SOURCE_META.forEach(s => sourceStatus[s.id] = 'error');
  }
  renderSourceChips();
  renderFeed();
  icon.classList.remove('spin');
}

function timeAgo(date){
  const diffMs = Date.now() - date.getTime();
  const mins = Math.floor(diffMs/60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins/60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs/24);
  if (days < 7) return `${days}d ago`;
  return date.toLocaleDateString();
}

function renderFeed(){
  const feedEl = document.getElementById('feed');
  const catSourceNames = new Set(
    SOURCE_META.filter(s => currentCategory==='all' || s.cat===currentCategory).map(s=>s.name)
  );
  const list = allArticles.filter(a => catSourceNames.has(a.source));

  if (!list.length){
    const anyLoading = Object.values(sourceStatus).some(v=>v==='loading');
    feedEl.innerHTML = anyLoading
      ? `<div class="state-msg"><span class="brand-spinner-lg"></span>Loading headlines…</div>`
      : `<div class="state-msg">No headlines available right now.<br>Pull to refresh or check back shortly.</div>`;
    return;
  }

  feedEl.innerHTML = list.slice(0, 60).map(a => `
    <a class="article" href="${a.link}" target="_blank" rel="noopener noreferrer">
      ${a.img ? `<img src="${a.img}" alt="" loading="lazy" onerror="this.style.display='none'">` : ''}
      <div class="article-body">
        <p class="article-title">${escapeHtml(a.title)}</p>
        <div class="article-meta">
          <span class="article-source">${escapeHtml(a.source)}</span>
          <span>·</span>
          <span>${timeAgo(a.date)}</span>
        </div>
      </div>
    </a>
  `).join('');
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

renderSourceChips();
loadAll(false);
</script>
</body>
</html>
