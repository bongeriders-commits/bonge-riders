<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chairperson Panel — BONGE RIDERS</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#141414">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BONGE RIDERS">
<link rel="apple-touch-icon" href="/icon-180.png">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #141414;
  --bg2:      #1C1C1C;
  --card:     #222222;
  --card2:    #2A2A2A;
  --border:   #333333;
  --text:     #F0EDE8;
  --muted:    #888888;
  --dim:      #555555;
  --amber:    #C4621D;
  --amber2:   #E07830;
  --amber-bg: rgba(196,98,29,0.12);
  --green:    #3D7A4F;
  --green2:   #4E9964;
  --green-bg: rgba(61,122,79,0.15);
  --red:      #C0392B;
  --red2:     #E74C3C;
  --red-bg:   rgba(192,57,43,0.12);
  --radius:   10px;
  --radius-lg:16px;
}
body.light {
  --bg: #F5F2EE; --bg2: #EDEAE5; --card: #FFFFFF; --card2: #F5F2EE;
  --border: #E0DBD4; --text: #141414; --muted: #777777; --dim: #AAAAAA;
  --amber-bg: rgba(196,98,29,0.08); --green-bg: rgba(61,122,79,0.08);
  --red-bg: rgba(192,57,43,0.08);
}

html, body {
  min-height: 100%; background: var(--bg); color: var(--text);
  font-family: 'Inter', sans-serif; font-size: 15px;
  -webkit-tap-highlight-color: transparent;
  transition: background .2s, color .2s; padding-bottom: 40px;
}

/* HEADER */
.header {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 12px 16px; position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.back-btn {
  background: var(--card2); border: 1px solid var(--border);
  color: var(--text); border-radius: 8px; width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; text-decoration: none; flex-shrink: 0;
}
.logo { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 17px; letter-spacing: -.3px; color: var(--text); }
.logo em { color: var(--amber2); font-style: normal; }
.logo-sub { font-size: 10px; font-weight: 500; color: var(--muted); letter-spacing: .6px; text-transform: uppercase; margin-top: 1px; }
.icon-btn {
  background: var(--card2); border: 1px solid var(--border);
  color: var(--text); border-radius: 8px; width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px;
}

/* LOGIN SCREEN */
#loginScreen {
  padding: 32px 16px; display: flex; flex-direction: column;
  align-items: center; text-align: center;
}
.login-icon {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--amber-bg); border: 2px solid var(--amber2);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; margin-bottom: 16px;
}
#loginScreen h2 {
  font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700;
  margin-bottom: 6px;
}
#loginScreen p { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
.login-box {
  width: 100%; max-width: 320px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 20px;
}
.login-box label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
.login-box input {
  width: 100%; background: var(--card2); border: 1px solid var(--border);
  color: var(--text); border-radius: var(--radius); padding: 12px 14px;
  font-size: 16px; font-family: 'Inter', sans-serif; outline: none;
  letter-spacing: 3px; margin-bottom: 14px;
  transition: border-color .15s;
}
.login-box input:focus { border-color: var(--amber2); }
.login-box input.err { border-color: var(--red); }

/* MAIN PANEL */
#mainPanel { display: none; padding: 16px; }

/* STATS ROW */
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
.stat-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 10px; text-align: center;
}
.stat-card .num {
  font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; line-height: 1;
}
.stat-card .lbl { font-size: 10px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: .4px; }
.stat-card.pending .num { color: var(--amber2); }
.stat-card.approved .num { color: var(--green2); }
.stat-card.declined .num { color: var(--red2); }

/* FILTER TABS */
.filter-tabs { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 2px; }
.filter-tab {
  padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
  border: 1px solid var(--border); background: var(--card2); color: var(--muted);
  cursor: pointer; white-space: nowrap; transition: all .15s;
}
.filter-tab.active { background: var(--amber); border-color: var(--amber); color: #fff; }

/* APPLICATION CARDS */
.app-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 14px; margin-bottom: 12px;
  position: relative; overflow: hidden;
}
.app-card.pending  { border-left: 3px solid var(--amber2); }
.app-card.approved { border-left: 3px solid var(--green2); }
.app-card.declined { border-left: 3px solid var(--red2); }

.app-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.app-name { font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 700; }
.app-phone { font-size: 12px; color: var(--muted); margin-top: 2px; }

.status-badge {
  font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px;
  letter-spacing: .4px; text-transform: uppercase; flex-shrink: 0;
}
.status-badge.pending  { background: var(--amber-bg); color: var(--amber2); }
.status-badge.approved { background: var(--green-bg); color: var(--green2); }
.status-badge.declined { background: var(--red-bg); color: var(--red2); }

.app-details {
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px 10px;
  margin-bottom: 12px;
}
.detail-item { font-size: 12px; }
.detail-item .dl { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .3px; }
.detail-item .dv { color: var(--text); font-weight: 500; margin-top: 1px; }

.app-date { font-size: 11px; color: var(--dim); margin-bottom: 12px; }

.action-row { display: flex; gap: 8px; }
.btn-approve {
  flex: 1; padding: 10px; border: none; border-radius: var(--radius);
  background: var(--green); color: #fff; font-weight: 700; font-size: 13px;
  cursor: pointer; font-family: 'Space Grotesk', sans-serif;
  transition: opacity .15s;
}
.btn-approve:active { opacity: .8; }
.btn-decline {
  flex: 1; padding: 10px; border: 1px solid var(--red); border-radius: var(--radius);
  background: transparent; color: var(--red2); font-weight: 700; font-size: 13px;
  cursor: pointer; font-family: 'Space Grotesk', sans-serif;
  transition: background .15s;
}
.btn-decline:active { background: var(--red-bg); }
.btn-wa {
  padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--card2); color: var(--text); font-size: 13px;
  cursor: pointer; transition: background .15s;
}
.btn-wa:active { background: var(--border); }

/* EMPTY / LOADING */
.empty-state {
  text-align: center; padding: 40px 16px; color: var(--muted); font-size: 14px;
}
.empty-state .ico { font-size: 40px; margin-bottom: 12px; }

.loading-state {
  text-align: center; padding: 40px 16px; color: var(--muted); font-size: 14px;
}

/* SECTION LABEL */
.section-label {
  font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 700;
  color: var(--amber2); letter-spacing: .8px; text-transform: uppercase;
  margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
}

/* SPINNER */
.spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
  border-radius: 50%; animation: spin .6s linear infinite;
  vertical-align: middle; margin-right: 5px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* REFRESH BTN */
.refresh-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.refresh-btn {
  background: var(--card2); border: 1px solid var(--border);
  color: var(--muted); border-radius: 8px; padding: 6px 12px;
  font-size: 12px; cursor: pointer; transition: background .15s;
}
.refresh-btn:active { background: var(--border); }

/* TOAST */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--card); border: 1px solid var(--border);
  color: var(--text); border-radius: 24px;
  padding: 10px 20px; font-size: 13px; font-weight: 500;
  white-space: nowrap; opacity: 0;
  transition: opacity .25s, transform .25s;
  z-index: 9999; pointer-events: none;
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* CONFIRM MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.6);
  z-index: 500; display: none; align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-sheet {
  background: var(--card); border-radius: 20px 20px 0 0;
  padding: 20px 16px 32px; width: 100%; max-width: 480px;
  border: 1px solid var(--border);
}
.modal-sheet h3 {
  font-family: 'Space Grotesk', sans-serif; font-size: 17px; font-weight: 700;
  margin-bottom: 8px;
}
.modal-sheet p { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
.modal-btns { display: flex; gap: 10px; }
.modal-btns button {
  flex: 1; padding: 13px; border-radius: var(--radius);
  font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 14px;
  cursor: pointer; border: none; transition: opacity .15s;
}
.modal-btns button:active { opacity: .8; }
.modal-cancel { background: var(--card2); color: var(--muted); border: 1px solid var(--border) !important; }
.modal-confirm-approve { background: var(--green); color: #fff; }
.modal-confirm-decline { background: var(--red); color: #fff; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <a href="index.html" class="back-btn">←</a>
    <div>
      <div class="logo">BONGE <em>RIDERS</em></div>
      <div class="logo-sub">Chairperson Panel</div>
    </div>
  </div>
  <button class="icon-btn" onclick="toggleTheme()">🌙</button>
</div>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-icon">🔐</div>
  <h2>Chairperson Access</h2>
  <p>Enter your secret key to manage member registrations</p>
  <div class="login-box">
    <label>Chairperson Key</label>
    <input type="password" id="keyInput" placeholder="••••••••" autocomplete="off"
      onkeydown="if(event.key==='Enter') doLogin()">
    <button style="width:100%;padding:13px;background:var(--amber);color:#fff;border:none;border-radius:var(--radius);font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;cursor:pointer;" onclick="doLogin()">
      Sign In
    </button>
  </div>
</div>

<!-- MAIN PANEL -->
<div id="mainPanel">

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card pending">
      <div class="num" id="statPending">0</div>
      <div class="lbl">Pending</div>
    </div>
    <div class="stat-card approved">
      <div class="num" id="statApproved">0</div>
      <div class="lbl">Approved</div>
    </div>
    <div class="stat-card declined">
      <div class="num" id="statDeclined">0</div>
      <div class="lbl">Declined</div>
    </div>
  </div>

  <!-- FILTER + REFRESH -->
  <div class="refresh-row">
    <div class="section-label" style="margin:0;border:none;padding:0;">Applications</div>
    <button class="refresh-btn" onclick="loadApplications()">↻ Refresh</button>
  </div>

  <div class="filter-tabs">
    <button class="filter-tab active" onclick="setFilter('all',this)">All</button>
    <button class="filter-tab" onclick="setFilter('pending',this)">⏳ Pending</button>
    <button class="filter-tab" onclick="setFilter('approved',this)">✓ Approved</button>
    <button class="filter-tab" onclick="setFilter('declined',this)">✕ Declined</button>
  </div>

  <div id="appList">
    <div class="loading-state">Loading applications…</div>
  </div>

</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal-sheet">
    <h3 id="modalTitle">Confirm Action</h3>
    <p id="modalBody">Are you sure?</p>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button id="modalConfirmBtn" onclick="doConfirm()">Confirm</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const SERVER = 'https://bonge-riders-server.onrender.com';

let chairKey = '';
let allApps  = [];
let curFilter = 'all';
let pendingAction = null; // { id, action }

// ── THEME ──
const savedTheme = localStorage.getItem('theme') || 'dark';
if (savedTheme === 'light') document.body.classList.add('light');
function toggleTheme() {
  document.body.classList.toggle('light');
  localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
}

// ── TOAST ──
function showToast(msg, dur = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// ── LOGIN ──
async function doLogin() {
  const key = document.getElementById('keyInput').value.trim();
  if (!key) { document.getElementById('keyInput').classList.add('err'); return; }

  chairKey = key;
  // Test by fetching pending list
  try {
    const res = await fetch(SERVER + '/api/register/pending', {
      headers: { 'x-chairperson-key': chairKey }
    });
    if (res.status === 403) {
      document.getElementById('keyInput').classList.add('err');
      showToast('❌ Incorrect key. Try again.');
      chairKey = '';
      return;
    }
    const data = await res.json();
    allApps = data.list || [];
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainPanel').style.display = 'block';
    renderApps();
  } catch(e) {
    showToast('❌ Could not connect to server. Check internet.');
    chairKey = '';
  }
}

// ── LOAD ──
async function loadApplications() {
  document.getElementById('appList').innerHTML = '<div class="loading-state">Loading…</div>';
  try {
    const res  = await fetch(SERVER + '/api/register/pending', {
      headers: { 'x-chairperson-key': chairKey }
    });
    const data = await res.json();
    allApps = data.list || [];
    renderApps();
    showToast('✓ Refreshed');
  } catch(e) {
    showToast('❌ Could not load applications');
  }
}

// ── FILTER ──
function setFilter(f, el) {
  curFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderApps();
}

// ── RENDER ──
function renderApps() {
  const pending  = allApps.filter(a => a.status === 'pending');
  const approved = allApps.filter(a => a.status === 'approved');
  const declined = allApps.filter(a => a.status === 'declined');

  document.getElementById('statPending').textContent  = pending.length;
  document.getElementById('statApproved').textContent = approved.length;
  document.getElementById('statDeclined').textContent = declined.length;

  let list = allApps;
  if (curFilter !== 'all') list = allApps.filter(a => a.status === curFilter);

  // Sort: pending first, then by date desc
  list = [...list].sort((a, b) => {
    if (a.status === 'pending' && b.status !== 'pending') return -1;
    if (b.status === 'pending' && a.status !== 'pending') return 1;
    return (b.submittedAt || 0) - (a.submittedAt || 0);
  });

  const el = document.getElementById('appList');
  if (list.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="ico">${curFilter === 'pending' ? '🎉' : '📭'}</div>${curFilter === 'pending' ? 'No pending applications!' : 'No applications found.'}</div>`;
    return;
  }

  el.innerHTML = list.map(app => {
    const status  = app.status || 'pending';
    const date    = app.submittedAt ? new Date(app.submittedAt).toLocaleDateString('en-KE', { day:'numeric', month:'short', year:'numeric' }) : '—';
    const phone   = formatPhone(app.phone || '');
    return `
    <div class="app-card ${status}" id="card-${app.id}">
      <div class="app-top">
        <div>
          <div class="app-name">${esc(app.name || '—')}</div>
          <div class="app-phone">${phone}</div>
        </div>
        <span class="status-badge ${status}">${status}</span>
      </div>
      <div class="app-details">
        <div class="detail-item">
          <div class="dl">National ID</div>
          <div class="dv">${esc(app.natId || '—')}</div>
        </div>
        <div class="detail-item">
          <div class="dl">Moto Plate</div>
          <div class="dv">${esc(app.motoReg || '—')}</div>
        </div>
        <div class="detail-item">
          <div class="dl">Make / Model</div>
          <div class="dv">${esc(app.motoModel || '—')} ${app.motoYear ? '('+app.motoYear+')' : ''}</div>
        </div>
        <div class="detail-item">
          <div class="dl">County</div>
          <div class="dv">${esc(app.county || 'Nairobi')}</div>
        </div>
        <div class="detail-item">
          <div class="dl">Next of Kin</div>
          <div class="dv">${esc(app.nokName || '—')}</div>
        </div>
        <div class="detail-item">
          <div class="dl">NoK Phone</div>
          <div class="dv">${app.nokPhone ? formatPhone(app.nokPhone) : '—'}</div>
        </div>
      </div>
      <div class="app-date">Submitted: ${date} · Ref: ${app.id}</div>
      <div class="action-row">
        ${status !== 'approved' ? `<button class="btn-approve" onclick="confirmAction('${app.id}','approve','${esc(app.name)}')">✓ Approve</button>` : ''}
        ${status !== 'declined' ? `<button class="btn-decline" onclick="confirmAction('${app.id}','decline','${esc(app.name)}')">✕ Decline</button>` : ''}
        <button class="btn-wa" onclick="whatsappApplicant('${phone}','${esc(app.name)}','${status}')" title="WhatsApp">📲</button>
      </div>
    </div>`;
  }).join('');
}

// ── CONFIRM MODAL ──
function confirmAction(id, action, name) {
  pendingAction = { id, action };
  const isApprove = action === 'approve';
  document.getElementById('modalTitle').textContent = isApprove ? 'Approve Member?' : 'Decline Application?';
  document.getElementById('modalBody').textContent  = isApprove
    ? `Approve ${name} as a member of Bogonko-Ngelani Stage? They will receive an SMS with their PIN.`
    : `Decline ${name}'s registration? They will receive an SMS notification.`;
  const btn = document.getElementById('modalConfirmBtn');
  btn.textContent = isApprove ? '✓ Yes, Approve' : '✕ Yes, Decline';
  btn.className = isApprove ? 'modal-confirm-approve' : 'modal-confirm-decline';
  document.getElementById('confirmModal').classList.add('open');
}

function closeModal() {
  document.getElementById('confirmModal').classList.remove('open');
  pendingAction = null;
}

async function doConfirm() {
  if (!pendingAction) return;
  const { id, action } = pendingAction;
  closeModal();

  const card = document.getElementById('card-' + id);
  if (card) card.style.opacity = '.5';

  try {
    const res  = await fetch(SERVER + '/api/register/review', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, action, chairpersonKey: chairKey })
    });
    const data = await res.json();
    if (data.ok) {
      showToast(action === 'approve' ? '✅ Member approved! SMS sent.' : '✕ Application declined. SMS sent.');
      // Update local state
      const idx = allApps.findIndex(a => a.id === id);
      if (idx >= 0) allApps[idx].status = action === 'approve' ? 'approved' : 'declined';
      renderApps();
    } else {
      showToast('⚠️ ' + (data.error || 'Action failed'), 4000);
      if (card) card.style.opacity = '1';
    }
  } catch(e) {
    showToast('❌ Could not reach server', 4000);
    if (card) card.style.opacity = '1';
  }
}

// ── WHATSAPP ──
function whatsappApplicant(phone, name, status) {
  const first = (name || '').split(' ')[0];
  let msg = '';
  if (status === 'approved') {
    msg = `Hello ${first}! 🎉 Your BOGONKO-NGELANI Stage membership has been APPROVED. Check your SMS for your PIN. Welcome aboard! 🏍️`;
  } else if (status === 'declined') {
    msg = `Hello ${first}, your BOGONKO-NGELANI registration was not approved. Please contact the Chairperson for more details.`;
  } else {
    msg = `Hello ${first}! 👋 Your BOGONKO-NGELANI registration is under review. We will notify you via SMS once a decision is made. 🏍️`;
  }
  const clean = phone.replace(/\D/g, '');
  window.open('https://wa.me/' + clean + '?text=' + encodeURIComponent(msg), '_blank');
}

// ── HELPERS ──
function formatPhone(p) {
  if (!p) return '—';
  const d = p.replace(/\D/g, '');
  if (d.startsWith('254') && d.length === 12) return '+254 ' + d.slice(3,6) + ' ' + d.slice(6,9) + ' ' + d.slice(9);
  return p;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Close modal on overlay click
document.getElementById('confirmModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Enter key on login
document.getElementById('keyInput').addEventListener('input', function() {
  this.classList.remove('err');
});
</script>
