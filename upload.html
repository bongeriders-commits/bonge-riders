<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nduthi Flix — Post a veed</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
</head>
<body>

<div class="upload-screen">
  <div class="upload-header">Post a veed</div>

  <div class="preview-box" id="previewBox">
    <div class="placeholder" id="placeholder">
      <div class="icon">🏍️</div>
      <div>Record or pick a video from your gallery</div>
    </div>
    <video id="previewVideo" class="hidden" playsinline muted loop controls></video>
  </div>

  <input type="file" id="fileInput" accept="video/*" capture="environment" class="hidden">
  <button class="btn-ghost" id="pickBtn">Choose video</button>

  <div class="field">
    <label>Caption</label>
    <textarea class="caption-input" id="captionInput" placeholder="What's happening on this ride?" maxlength="200"></textarea>
  </div>

  <div class="field">
    <label>Tag (optional)</label>
    <input type="text" id="tagInput" placeholder="e.g. Thika Road, MaintenanceTips" maxlength="30">
  </div>

  <p class="error-msg hidden" id="uploadError"></p>

  <div class="progress-track hidden" id="progressTrack">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <p class="status-line hidden" id="statusLine"></p>

  <button class="btn-primary" id="postBtn" disabled>Post veed</button>
  <button class="btn-ghost" id="cancelBtn">Cancel</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/upload.js"></script>
</body>
</html>
